services:
  - type: web
    name: inventory-api
    runtime: docker
    dockerfilePath: ./Dockerfile
    dockerContext: ./backend
    plan: free
    envVars:
      - key: DATABASE_URL
        fromDatabase:
          name: inventory-db
          property: connectionString
      - key: CORS_ORIGINS
        sync: false
      - key: LOW_STOCK_THRESHOLD
        value: "10"

databases:
  - name: inventory-db
    plan: free
    databaseName: inventory_db
    user: inventory
